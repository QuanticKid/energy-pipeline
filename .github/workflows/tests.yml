name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Tests run inside the Airflow image so the DAG is parsed by the exact
      # Airflow version the project ships with.
      - name: Build Airflow image
        run: docker build -f Dockerfile.airflow -t energy-pipeline-test .

      - name: Debug DagBag
        run: |
          docker run --rm \
            -v "$PWD/dags:/opt/airflow/project/dags:ro" \
            -v "$PWD/ingestion:/opt/airflow/project/ingestion:ro" \
            -v "$PWD/app:/opt/airflow/project/app:ro" \
            -e PYTHONPATH=/opt/airflow/project \
            -e FINGRID_API_KEY=dummy-key-for-tests \
            --entrypoint bash \
            energy-pipeline-test \
            -c "python -c \"
          import logging, os
          logging.basicConfig(level=logging.DEBUG)
          from airflow.models import DagBag
          b = DagBag(dag_folder='/opt/airflow/project/dags', include_examples=False)
          print('AIRFLOW_HOME:', os.environ.get('AIRFLOW_HOME'))
          print('DAGS:', list(b.dags))
          print('ERRORS:', b.import_errors)
          print('STATS:', b.dagbag_stats)
          \""

      - name: Run tests
        run: |
          docker run --rm \
            -v "$PWD/tests:/opt/airflow/project/tests:ro" \
            -v "$PWD/dags:/opt/airflow/project/dags:ro" \
            -v "$PWD/ingestion:/opt/airflow/project/ingestion:ro" \
            -v "$PWD/app:/opt/airflow/project/app:ro" \
            -e PYTHONPATH=/opt/airflow/project \
            -e FINGRID_API_KEY=dummy-key-for-tests \
            --entrypoint bash \
            energy-pipeline-test \
            -c "cd /opt/airflow/project && python -m pytest tests -v -p no:cacheprovider"