services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: energy123
      POSTGRES_DB: energy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: fastapi run app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python -m ingestion.scheduler
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: